    <!-- UTM persistence: capture & restore URL params BEFORE any tracking script runs -->
    <script>
      (function () {
        try {
          var KEY = "__url_params__";
          var search = window.location.search || "";
          if (search && search !== "?") {
            sessionStorage.setItem(KEY, search);
          } else {
            var stored = sessionStorage.getItem(KEY);
            if (stored && stored !== "?") {
              var newUrl = window.location.pathname + stored + window.location.hash;
              window.history.replaceState(window.history.state, "", newUrl);
            }
          }
        } catch (e) {}
      })();
    </script>

    <!-- TikTok Pixel UTMify -->
    <script>
      window.tikTokPixelId = "699375b3ba5b4328a8683be2";
      var a = document.createElement("script");
      a.setAttribute("async", "");
      a.setAttribute("defer", "");
      a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel-tiktok.js");
      document.head.appendChild(a);
    </script>

    <!-- UTMify Tracking -->
    <script
      src="https://cdn.utmify.com.br/scripts/utms/latest.js"
